version: "3.8"

services:
  postgres:
    image: postgres:14
    container_name: riojamap-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: riojamap
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
