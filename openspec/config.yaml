# RiojaMAP - SDD Configuration
# Spec-Driven Development — project context for interactive map observatory

project:
  name: riojamap
  path: /home/lucas/docs/Code/RIOJAMAP
  description: Interactive map observatory for La Rioja province, Argentina. Tracks government works/obras and payments.
  production_url: https://riojamap.devlab1.online
  repository: https://github.com/LCarrizo221/RIOJAMAP

stack:
  frontend:
    runtime: Node.js
    framework: React 19
    language: TypeScript
    bundler: Vite 6
    styling: Tailwind CSS v4
    mapping:
      - react-leaflet (Leaflet)
    visualization: Recharts
    ui_icons: lucide-react
    animations: motion
  backend:
    runtime: Node.js 24.14.0
    framework: Express
    orm: Prisma 5.22.0
    validation: Zod
    database: PostgreSQL 14
    process_manager: PM2 6.0.14
  
infrastructure:
  provider: DonWeb (VPS)
  host: 179.43.127.166
  ssh_port: 5008
  domain: riojamap.devlab1.online
  ssl: Let's Encrypt (via Certbot)
  ssl_expiry: 2026-10-06
  web_server: Nginx 1.24.0
  backend_port: 3003
  os: Ubuntu 24.04.4 LTS
  backend_path: /var/www/RIOJAMAP
  pm2_name: riojamap-backend
  deploy_pattern: git push → VPS pull + build → PM2 restart
  
data_sources:
  geojson_api: https://apis.datos.gob.ar/georef/api/departamentos?provincia=la%20rioja&formato=geojson&max=50
  local_geojson: /home/lucas/docs/Code/RIOJAMAP/client/src/data/la_rioja.json
  data_model_origin: PostgreSQL via Prisma (44 obras seedeadas)
  
architecture:
  pattern: Component-based (React) + Express REST API
  deployment: Nginx reverse proxy → PM2 (Express) → Prisma → PostgreSQL
  key_components:
    - App.tsx (root, state management for hover/select)
    - Map.tsx (react-leaflet GeoJSON rendering, map controls)
    - Sidebar.tsx (department info display)
    - Dashboard.tsx (detailed view with charts + KPIs)
    - ObraModal.tsx (CRUD form)
    - Express API (CRUD + filtros + KPIs en /api/obras)

conventions:
  typescript:
    config: tsconfig.json
    target: ES2022
    module: ESNext
    moduleResolution: bundler
    jsx: react-jsx
    strict: true
  styling:
    framework: Tailwind CSS v4
    config: Via @tailwindcss/vite plugin
    approach: Utility-first, inline className
  alias: "@" maps to project root

testing:
  strict_tdd: false
  current_capabilities:
    - TypeScript type checking via "lint": "tsc --noEmit"
  missing:
    - Unit test framework (Jest/Vitest)
    - Component testing (React Testing Library)
    - E2E testing (Playwright/Cypress)
    - API testing (Supertest)
    - Prisma testing utilities
  
persistence_mode: hybrid
artifacts:
  openspec:
    - openspec/config.yaml
    - openspec/changes/active/2026-07-08-produccion-deploy-vps/
    - openspec/changes/archive/2026-07-08-migracion-postgresql-backend-frontend/
  engram:
    - sdd/riojamap/project-context
    - sdd/riojamap/testing-capabilities

active_changes:
  - name: 2026-07-08-produccion-deploy-vps
    status: completed
    description: Full production deployment to VPS DevLab1

archived_changes:
  - name: 2026-07-08-migracion-postgresql-backend-frontend
    status: archived
    description: Backend PostgreSQL + Express API + Frontend adaptation
